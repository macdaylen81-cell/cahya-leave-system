{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-12">
    <div class="card bg-base-100 shadow-2xl">
        <div class="card-body">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold">Cahya Mata Intelligence</h1>
                <p class="text-sm text-gray-500">Leave Management System</p>
            </div>

            {% if error %}
            <div class="alert alert-error mb-6">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-control">
                    <label class="label"><span class="label-text">Username</span></label>
                    <input type="text" name="username" class="input input-bordered" required />
                </div>

                <div class="form-control mt-4">
                    <label class="label"><span class="label-text">Password</span></label>
                    <input type="password" name="password" class="input input-bordered" required />
                </div>

                {% if totp_required %}
                <div class="form-control mt-4">
                    <label class="label"><span class="label-text">TOTP Code (2FA)</span></label>
                    <input type="text" name="totp_code" maxlength="6" class="input input-bordered text-center text-xl" placeholder="123456" required />
                </div>
                {% endif %}

                <div class="mt-6">
                    <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-8">Sign In</button>
            </form>

            <div class="text-center mt-6 text-xs text-gray-500">
                Default Admin: admin / admin123
            </div>
        </div>
    </div>
</div>

{% endblock %}
