{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-8">
    <div class="card bg-base-100 shadow-2xl">
        <div class="card-body">
            <h2 class="card-title text-2xl">Setup Two-Factor Authentication</h2>
            <p class="text-sm mb-6">Scan this QR code using Google Authenticator app on your phone.</p>

            {% if error %}
                <div class="alert alert-error mb-6">{{ error }}</div>
            {% endif %}

            <!-- QR Code -->
            <div class="flex justify-center my-6">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data={{ provisioning_uri }}" 
                     alt="2FA QR Code" 
                     class="border-4 border-primary rounded-xl">
            </div>

            <div class="bg-base-200 p-4 rounded-lg mb-6">
                <p class="text-xs text-gray-500 mb-1">Secret Key (Manual Entry):</p>
                <p class="font-mono break-all text-sm">{{ secret }}</p>
            </div>

            <form method="post" action="/totp/enable">
                <label class="label">
                    <span class="label-text">Enter 6-digit code from Google Authenticator</span>
                </label>
                <input type="text" name="code" maxlength="6" 
                       class="input input-bordered w-full text-center text-2xl" 
                       required autofocus>

                <button type="submit" class="btn btn-primary w-full mt-6">Verify & Enable 2FA</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
